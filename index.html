<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.P.A - Classificação Pessoal do Aluno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #19242e;
            --card-bg: #724141;
            --white: #ffffff;
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: white; overflow-x: hidden; }

        /* --- LANDING PAGE --- */
        #landing-page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 20px; box-sizing: border-box;
            background: linear-gradient(rgba(25, 36, 46, 0.85), rgba(25, 36, 46, 0.85)), url('https://images.unsplash.com/photo-1523050335392-9bc567597280?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
        }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 20px; color: var(--accent); font-weight: 800; }
        .btn-start {
            background: var(--success); color: white; padding: 18px 50px; border-radius: 50px;
            font-weight: bold; font-size: 1.2rem; border: none; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); text-transform: uppercase;
        }

        /* --- SISTEMA --- */
        #sistema-cpa { display: none; }
        header { background: var(--card-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; font-size: 1.1rem; color: var(--primary); }
        
        /* Menu Lateral */
        .side-menu { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: var(--primary); color: white; transition: 0.3s; z-index: 1001; padding-top: 20px; display: flex; flex-direction: column; }
        .side-menu.active { right: 0; }
        .close-menu { font-size: 2rem; cursor: pointer; padding: 10px 20px; display: block; text-align: right; }
        .menu-content { padding: 0 20px; flex: 1; overflow-y: auto; }

        .student-item { 
            background: rgba(255,255,255,0.05); padding: 12px; margin-bottom: 8px; border-radius: 6px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .student-item:hover { background: rgba(255,255,255,0.15); }
        .btn-del-small { background: var(--danger); border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        /* Tabela Responsiva */
        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; min-width: 480px; }
        th, td { border: 1px solid #ddd; padding: 10px 5px; text-align: center; color: #333; }
        th { background: #16b877; color: white; font-size: 0.8rem; }
        .input-nota { width: 45px; padding: 8px 2px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }

        main { padding: 20px 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        @media (min-width: 600px) { .btn-grid { grid-template-columns: 1fr 1fr; } }

        .btn { border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; }
        .btn-calc { background: var(--accent); }
        .btn-save { background: var(--success); }
        .btn-pdf { background: var(--warning); color: #333; }
        .btn-clear { background: #95a5a6; }

        #resultado { display: none; margin-top: 20px; padding: 15px; background: #2b506f; border-radius: 10px; border-left: 5px solid var(--accent); }
        .chart-container { background: white; padding: 10px; border-radius: 8px; margin-top: 15px; }
        footer { background: var(--primary); text-align: center; padding: 20px; margin-top: 40px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <section id="landing-page">
        <h1 class="hero-title">SISTEMA C.P.A</h1>
        <p style="margin-bottom: 30px; opacity: 0.9;">Classificação Pessoal do Aluno</p>
        <button class="btn-start" onclick="iniciarApp()">ENTRAR NO SISTEMA</button>
    </section>

    <div id="sistema-cpa">
        <div id="sideMenu" class="side-menu">
            <span class="close-menu" onclick="toggleMenu()">&times;</span>
            <div class="menu-content">
                <h3 style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px;">Histórico</h3>
                <div id="listaDinamica"></div>
                <button class="btn" style="background:var(--danger); width:100%; margin-top:30px;" onclick="apagarTudo()">LIMPAR TUDO</button>
            </div>
        </div>

        <header>
            <div class="logo">SISTEMA C.P.A</div>
            <div onclick="toggleMenu()" style="cursor:pointer; font-size: 1.8rem; color: var(--primary);">☰</div>
        </header>

        <main>
            <div class="card">
                <h1 style="text-align: center;">ORIENTADOR DE PERCURSO</h1>
                
                <label style="display:block; margin-bottom:8px; font-weight:bold;">Nome do Aluno:</label>
                <input type="text" id="nomeEstudante" style="width:100%; padding:14px; border-radius:8px; border:none; margin-bottom:20px; box-sizing:border-box;" placeholder="Nome Completo">

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Disciplina</th>
                                <th>8ª Classe</th>
                                <th>9ª Classe</th>
                                <th>10ª Classe</th>
                                <th>Média</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela"></tbody>
                    </table>
                </div>

                <div class="btn-grid">
                    <button class="btn btn-calc" onclick="calcular()">CALCULAR</button>
                    <button class="btn btn-save" onclick="salvar()">SALVAR</button>
                    <button class="btn btn-pdf" onclick="gerarPDF()">PDF</button>
                    <button class="btn btn-clear" onclick="limparCampos()">LIMPAR</button>
                </div>

                <div id="resultado">
                    <h3 id="resNome" style="margin-top:0"></h3>
                    <div id="resMedias" style="font-size: 1rem; margin: 10px 0;"></div>
                    <h2 id="resFinal" style="color: #2ecc71; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;"></h2>
                    <div class="chart-container"><canvas id="graficoBarras"></canvas></div>
                </div>
            </div>
        </main>
        <footer>© 2026 C.A.C.T | Direitos Reservados by Richard</footer>
    </div>

    <script>
        const disciplinas = [
            {id: 'Por', nome: 'Português', f8: true}, {id: 'Im', nome: 'Inglês', f8: true},
            {id: 'Fr', nome: 'Francês', f8: false}, {id: 'M', nome: 'Matemática', f8: true},
            {id: 'F', nome: 'Física', f8: true}, {id: 'Q', nome: 'Química', f8: true},
            {id: 'B', nome: 'Biologia', f8: true}, {id: 'G', nome: 'Geografia', f8: true},
            {id: 'H', nome: 'História', f8: true}, {id: 'EVT', nome: 'Ed. Visual', f8: true}
        ];

        let bancoDados = JSON.parse(localStorage.getItem('cact_cpa_db')) || [];
        let meuGrafico = null;

        function iniciarApp() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('sistema-cpa').style.display = 'block';
        }

        const corpo = document.getElementById('corpoTabela');
        disciplinas.forEach(d => {
            const tr = document.createElement('tr');
            tr.dataset.subj = d.id;
            tr.innerHTML = `
                <td style="text-align:left; font-weight:bold; padding-left: 10px;">${d.nome}</td>
                <td>${d.f8 ? `<input type="number" class="input-nota n8" onchange="v(this)">` : 'N/A'}</td>
                <td><input type="number" class="input-nota n9" onchange="v(this)"></td>
                <td><input type="number" class="input-nota n10" onchange="v(this)"></td>
                <td class="m-cell" style="font-weight:bold;">—</td>
            `;
            corpo.appendChild(tr);
        });

        function v(i) { if(i.value < 0 || i.value > 20) i.value = ""; i.style.color = i.value < 10 ? "red" : "green"; }

        function toggleMenu() { 
            document.getElementById('sideMenu').classList.toggle('active'); 
            if(document.getElementById('sideMenu').classList.contains('active')) atualizarLista();
        }

        function calcular() {
            const nome = document.getElementById('nomeEstudante').value;
            if(!nome) return alert("Insira o nome do aluno!");

            let notasResumo = {};
            let detalhe = {};

            document.querySelectorAll('#corpoTabela tr').forEach(tr => {
                const id = tr.dataset.subj;
                const v8 = tr.querySelector('.n8')?.value || "";
                const v9 = tr.querySelector('.n9')?.value || "";
                const v10 = tr.querySelector('.n10')?.value || "";
                detalhe[id] = {v8, v9, v10};
                
                let s=0, q=0;
                [v8, v9, v10].forEach(v => { if(v!=="") { s+=parseFloat(v); q++; }});
                let m = q > 0 ? s/q : 0;
                notasResumo[id] = m;
                tr.querySelector('.m-cell').innerText = m > 0 ? m.toFixed(1) : "—";
            });

            const mA = (notasResumo.Por + notasResumo.Im + notasResumo.G + notasResumo.H + (notasResumo.Fr || 0)) / 5;
            const mB = (notasResumo.M + notasResumo.F + notasResumo.B + notasResumo.Q) / 4;
            const mC = (notasResumo.M + notasResumo.F + notasResumo.Q + notasResumo.EVT) / 4;

            document.getElementById('resNome').innerText = "Estudante: " + nome;
            document.getElementById('resMedias').innerHTML = `Grupo A: ${mA.toFixed(2)} | Grupo B: ${mB.toFixed(2)} | Grupo C: ${mC.toFixed(2)}`;
            let r = (mB > mA && mB > mC) ? "CIÊNCIAS (B)" : (mC > mA ? "TÉCNICO (C)" : "LETRAS (A)");
            document.getElementById('resFinal').innerText = "RECOMENDAÇÃO: " + r;
            document.getElementById('resultado').style.display = 'block';

            desenharGrafico(mA, mB, mC);
            return {nome, mA, mB, mC, r, detalhe};
        }

        function desenharGrafico(a, b, c) {
            const ctx = document.getElementById('graficoBarras').getContext('2d');
            if(meuGrafico) meuGrafico.destroy();
            meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['G. Letras (A)', 'G. Ciências (B)', 'G. Técnico (C)'],
                    datasets: [{ data: [a,b,c], backgroundColor: ['#3498db', '#27ae60', '#f1c40f'] }]
                },
                options: { scales: { y: { beginAtZero: true, max: 20 } }, plugins: { legend: false } }
            });
        }

        function salvar() {
            const d = calcular(); if(!d) return;
            bancoDados.push({...d, id: Date.now()});
            localStorage.setItem('cact_cpa_db', JSON.stringify(bancoDados));
            alert("Dados salvos no histórico!");
        }

        function atualizarLista() {
            const lista = document.getElementById('listaDinamica');
            lista.innerHTML = bancoDados.map(a => `
                <div class="student-item">
                    <div onclick="carregar(${a.id})" style="flex:1;"><b>${a.nome}</b><br><small>${a.r}</small></div>
                    <button class="btn-del-small" onclick="apagarUm(${a.id})">X</button>
                </div>
            `).join('');
        }

        function carregar(id) {
            const a = bancoDados.find(x => x.id === id);
            document.getElementById('nomeEstudante').value = a.nome;
            document.querySelectorAll('#corpoTabela tr').forEach(tr => {
                const idS = tr.dataset.subj;
                const n = a.detalhe[idS];
                if(tr.querySelector('.n8')) tr.querySelector('.n8').value = n.v8;
                tr.querySelector('.n9').value = n.v9;
                tr.querySelector('.n10').value = n.v10;
            });
            calcular(); toggleMenu();
        }

        function apagarUm(id) {
            if(confirm("Eliminar este aluno?")) {
                bancoDados = bancoDados.filter(x => x.id !== id);
                localStorage.setItem('cact_cpa_db', JSON.stringify(bancoDados));
                atualizarLista();
            }
        }

        function limparCampos() {
            document.getElementById('nomeEstudante').value = "";
            document.querySelectorAll('.input-nota').forEach(i => i.value = "");
            document.querySelectorAll('.m-cell').forEach(c => c.innerText = "—");
            document.getElementById('resultado').style.display = 'none';
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const nome = document.getElementById('nomeEstudante').value || "Aluno";
            doc.setFontSize(18); doc.text("Relatório de Orientação C.P.A", 105, 20, {align:'center'});
            doc.setFontSize(12); doc.setTextColor(0,0,0); doc.text("Nome do Aluno: ", 20, 35);
            doc.setTextColor(52, 152, 219); doc.text(nome, 55, 35);
            doc.setTextColor(0);
            doc.autoTable({
                startY: 45,
                head: [['Grupo Académico', 'Média']],
                body: [
                    ['Grupo A (Letras)', document.getElementById('resMedias').innerText.split('|')[0].split(':')[1].trim()],
                    ['Grupo B (Ciências)', document.getElementById('resMedias').innerText.split('|')[1].split(':')[1].trim()],
                    ['Grupo C (Técnico)', document.getElementById('resMedias').innerText.split('|')[2].split(':')[1].trim()],
                ],
                headStyles: { fillColor: [22, 184, 119] }
            });
            doc.addImage(document.getElementById('graficoBarras').toDataURL(), 'PNG', 30, doc.lastAutoTable.finalY + 15, 140, 75);
            doc.save(`Relatorio_CPA_${nome}.pdf`);
        }

        function apagarTudo() { if(confirm("Apagar TODO o histórico?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
